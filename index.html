<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GdA RRHH - Portal del Empleado</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <style>
      #root, body, html, * {
        font-family: 'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif !important;
      }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Outfit', 'Inter', 'system-ui', 'sans-serif'],
            },
            colors: {
              brand: {
                50: '#F5F3FF',
                100: '#EDE9FE',
                200: '#DDD6FE',
                300: '#C4B5FD',
                400: '#A78BFA',
                500: '#6366F1',
                600: '#4F46E5',
                700: '#4338CA',
                800: '#3730A3',
                900: '#312E81',
                950: '#1E1B4B',
                DEFAULT: '#6366F1',
              },
              sidebar: '#2D32C1',
            },
            borderRadius: {
              '3xl': '1.5rem',
              '4xl': '2rem',
              '5xl': '2.5rem',
            },
            boxShadow: {
              'premium': '0 20px 50px -12px rgba(0, 0, 0, 0.05)',
              'card': '0 10px 30px -5px rgba(0, 0, 0, 0.03)',
            },
            animation: {
              'fade-in': 'fadeIn 0.5s ease-out',
              'fade-in-up': 'fadeInUp 0.5s ease-out',
              'scale-in': 'scaleIn 0.3s ease-out',
            },
            keyframes: {
              fadeIn: {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' },
              },
              fadeInUp: {
                '0%': { opacity: '0', transform: 'translateY(20px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              scaleIn: {
                '0%': { opacity: '0', transform: 'scale(0.95)' },
                '100%': { opacity: '1', transform: 'scale(1)' },
              }
            }
          }
        }
      }
    </script>
    <style>
      /* Custom Scrollbar for a premium feel */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent; 
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1; 
        border-radius: 20px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8; 
      }

      body {
        background-color: #f8fafc;
      }
      
      #root {
        position: relative;
        z-index: 10;
      }

      @media print {
        @page { 
          size: landscape; 
          margin: 10mm; 
        }
        
        /* Reset radical de altura y desbordamiento para permitir múltiples páginas */
        html, body, #root, #root > div, main {
          height: auto !important;
          overflow: visible !important;
          display: block !important;
          position: static !important;
        }

        /* Desactivar explícitamente clases de Tailwind que limitan altura o scroll */
        div[class*="h-screen"], 
        div[class*="h-[100dvh]"],
        div[class*="overflow-hidden"],
        div[class*="overflow-auto"],
        div[class*="overflow-y-auto"],
        main > div {
          height: auto !important;
          max-height: none !important;
          overflow: visible !important;
          display: block !important;
          position: static !important;
        }

        body {
          background: white !important;
          -webkit-print-color-adjust: exact !important;
          print-color-adjust: exact !important;
        }

        /* Ocultar elementos de la interfaz */
        aside, header, nav, .print-hidden, .print\:hidden, button, [role="dialog"], .fixed.inset-0 { 
          display: none !important; 
        }
        
        main {
          margin: 0 !important;
          padding: 0 !important;
          width: 100% !important;
        }

        .bg-white { background: white !important; }
        .bg-slate-50 { background: #f8fafc !important; }
        .bg-slate-900 { background: #0f172a !important; }
        .text-white { color: white !important; }
        
        .rounded-3xl, .rounded-2xl, .rounded-xl { border-radius: 4px !important; }
        .shadow-sm, .shadow-md, .shadow-lg, .shadow-xl, .shadow-2xl { box-shadow: none !important; border: 1px solid #e2e8f0 !important; }

        .print\:break-after-page {
          break-after: page !important;
          page-break-after: always !important;
          display: block;
        }

        /* Asegurar que el contenedor de impresión sea visible y ocupe el ancho total */
        .hidden.print\:block {
          display: block !important;
          width: 100% !important;
        }
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@4.2.1?deps=react@19.0.0,react-dom@19.0.0",
    "lucide-react": "https://esm.sh/lucide-react@0.468.0?deps=react@19.0.0",
    "vite": "https://esm.sh/vite@5.1.6",
    "react": "https://esm.sh/react@19.0.0",
    "react/jsx-runtime": "https://esm.sh/react@19.0.0/jsx-runtime",
    "react-dom/client": "https://esm.sh/react-dom@19.0.0/client?deps=react@19.0.0",
    "react-dom": "https://esm.sh/react-dom@19.0.0?deps=react@19.0.0",
    "recharts": "https://esm.sh/recharts@2.12.7?deps=react@19.0.0,react-dom@19.0.0",
    "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2.39.7",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/"
  }
}
</script>
</head>
  <body class="bg-slate-50 text-slate-900 font-sans antialiased">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
